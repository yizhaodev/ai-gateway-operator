apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: {{ include "chart.fullname" . }}
  name: opendatahub-ai-gateway-leader-election-rolebinding
  namespace: {{ include "chart.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opendatahub-ai-gateway-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ default (include "chart.fullname" .) .Values.serviceAccount.name }}
  namespace: {{ include "chart.namespace" . }}